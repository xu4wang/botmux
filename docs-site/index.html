<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>botmux 文档已搬家</title>
  <style>
    :root{color-scheme:light dark}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:#f5f6f7;color:#1f2329;padding:24px}
    .box{max-width:520px;text-align:center;background:#fff;border-radius:16px;padding:40px 32px;
      box-shadow:0 8px 32px rgba(0,0,0,.08)}
    h1{font-size:24px;margin:0 0 12px}
    p{margin:10px 0;line-height:1.7;color:#4e5969}
    .btn{display:inline-block;margin:18px 0 8px;padding:12px 28px;border-radius:10px;
      background:#3370ff;color:#fff;text-decoration:none;font-weight:600;font-size:16px}
    .btn:hover{background:#245bdb}
    .url{font-size:13px;color:#86909c;word-break:break-all}
    @media (prefers-color-scheme:dark){
      body{background:#1a1a1a;color:#e5e6eb}.box{background:#252525;box-shadow:none}
      p{color:#a6adb5}.url{color:#6b7280}
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>📖 botmux 文档已搬家</h1>
    <p>文档站已迁移到新地址，内容更全，支持站内搜索、代码高亮、图文与视频演示。</p>
    <a class="btn" href="https://github.com/deepcoldy/botmux/tree/master/docs-site/docs/zh">前往文档源码 →</a>
    <p class="url">https://github.com/deepcoldy/botmux/tree/master/docs-site/docs/zh</p>
  </div>
  <script>
    // best-effort 自动跳转；妙笔沙箱里若被拦，上方按钮兜底
    var NEW_URL = "https://github.com/deepcoldy/botmux/tree/master/docs-site/docs/zh";
    try { window.top.location.replace(NEW_URL); }
    catch (e) { try { window.location.replace(NEW_URL); } catch (_) {} }
  </script>
</body>
</html>
