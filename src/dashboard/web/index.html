<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>botmux dashboard</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <!-- 深空极光底（纯装饰，dark 主题可见） -->
  <div class="aurora" aria-hidden="true"><i class="a1"></i><i class="a2"></i><i class="a3"></i></div>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="#/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>
          <strong data-i18n="app.name">botmux</strong>
          <small data-i18n="app.subtitle">飞书 AI CLI 控制台</small>
        </span>
      </a>
      <nav class="sidebar-nav" aria-label="Dashboard">
        <a href="#/" data-route="overview"><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="1.5" y="1.5" width="5.4" height="5.4" rx="1.5"/><rect x="9.1" y="1.5" width="5.4" height="5.4" rx="1.5"/><rect x="1.5" y="9.1" width="5.4" height="5.4" rx="1.5"/><rect x="9.1" y="9.1" width="5.4" height="5.4" rx="1.5"/></svg><span data-i18n="nav.overview">总览</span></a>
        <a href="#/sessions" data-route="sessions"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 3.5h12v7H6l-3 3v-3H2z"/></svg><span data-i18n="nav.sessions">会话</span></a>
        <a href="#/insights" data-route="insights"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2 2v12h12M5 11V7M8.5 11V4.5M12 11V8.5"/></svg><span data-i18n="nav.insights">洞察</span></a>
        <a href="#/workflows" data-route="workflows"><svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="3.4" cy="3.6" r="1.9"/><circle cx="3.4" cy="12.4" r="1.9"/><circle cx="12.6" cy="8" r="1.9"/><path d="M5.2 4.4l5.6 2.8M5.2 11.6l5.6-2.8"/></svg><span data-i18n="nav.workflows">工作流</span></a>
        <a href="#/groups" data-route="groups"><svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="5.6" cy="5.8" r="2.4"/><circle cx="11" cy="6.8" r="1.9"/><path d="M1.8 13.2c.5-2.4 2-3.6 3.8-3.6s3.3 1.2 3.8 3.6M9.8 12.6c.4-1.7 1.5-2.6 2.8-2.6 1 0 1.9.5 2.4 1.6"/></svg><span data-i18n="nav.groups">群组</span></a>
        <a href="#/schedules" data-route="schedules"><svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="6.2"/><path d="M8 4.5V8l2.4 1.6"/></svg><span data-i18n="nav.schedules">定时</span></a>
        <a href="#/whiteboards" data-route="whiteboards"><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2.2" y="2.2" width="11.6" height="11.6" rx="2"/><path d="M4.8 5.2h6.4M4.8 8h6.4M4.8 10.8h4"/></svg><span>白板</span></a>
        <a href="#/roles" data-route="roles"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.8l5.2 2v3.4c0 3.4-2.2 5.9-5.2 7-3-1.1-5.2-3.6-5.2-7V3.8z"/><path d="M5.8 8l1.6 1.6 2.8-3"/></svg><span data-i18n="nav.roles">角色管理</span></a>
        <a href="#/bot-defaults" data-route="bot-defaults"><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="2.5" y="5" width="11" height="8" rx="2"/><circle cx="5.8" cy="9" r="1"/><circle cx="10.2" cy="9" r="1"/><path d="M8 5V2.5M5.5 13v1.2M10.5 13v1.2"/></svg><span data-i18n="nav.botDefaults">Bot 配置</span></a>
        <a href="#/skills" data-route="skills"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 2.5h10v3H3zM3 7h10v6.5H3z"/><path d="M5.4 9.2h5.2M5.4 11.2h3.8"/></svg><span data-i18n="nav.skills">Skills</span></a>
        <a href="#/team" data-route="team"><svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="6.2"/><path d="M1.8 8h12.4M8 1.8c-2 1.8-2 10.6 0 12.4 2-1.8 2-10.6 0-12.4z"/></svg><span>团队</span></a>
        <a href="#/connectors" data-route="connectors"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M5.5 6.5v-3a2.5 2.5 0 0 1 5 0v3"/><rect x="3.5" y="6.5" width="9" height="7" rx="2"/></svg><span>Webhook</span></a>
        <a href="#/office" data-route="office"><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="3" y="4" width="10" height="7" rx="2"/><circle cx="6" cy="7.5" r="1"/><circle cx="10" cy="7.5" r="1"/><path d="M8 4V2M4.5 11v2M11.5 11v2"/></svg><span>办公室</span></a>
        <a href="#/settings" data-route="settings"><svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="2.2"/><path d="M8 1.8v2M8 12.2v2M3.6 3.6L5 5M11 11l1.4 1.4M1.8 8h2M12.2 8h2M3.6 12.4L5 11M11 5l1.4-1.4"/></svg><span data-i18n="nav.settings">设置</span></a>
      </nav>
      <div class="sidebar-foot">
        <span id="status" class="connection-status"></span>
        <button type="button" id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M9.8 3.5 5.3 8l4.5 4.5"/></svg>
        </button>
      </div>
    </aside>
    <div class="workspace">
      <header class="topbar">
        <div class="topbar-title">
          <strong data-i18n="app.name">botmux</strong>
          <span data-i18n="app.subtitle">飞书 AI CLI 控制台</span>
        </div>
        <div class="topbar-actions">
          <button type="button" id="create-session-btn" class="primary topbar-create-session">＋ <span data-i18n="sessions.create.button">创建会话</span></button>
          <button type="button" id="add-bot-btn" class="primary topbar-add-bot" data-i18n="botOnboarding.add">添加机器人</button>
          <div class="segmented" aria-label="Language">
            <button type="button" data-locale="zh">中</button>
            <button type="button" data-locale="en">EN</button>
          </div>
          <div class="theme-menu" id="theme-menu">
            <button type="button" class="theme-menu-btn" id="theme-menu-btn"
                    aria-haspopup="listbox" aria-expanded="false" aria-label="Theme"></button>
            <div class="theme-menu-pop" id="theme-menu-pop" role="listbox" hidden></div>
          </div>
          <a class="topbar-docs-link" href="https://github.com/deepcoldy/botmux/tree/master/docs-site/docs"
             target="_blank" rel="noopener noreferrer" title="botmux 文档">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2.5 2.5h5.5a1.5 1.5 0 0 1 1.5 1.5v9M13.5 2.5H8a1.5 1.5 0 0 0-1.5 1.5v9M2.5 2.5v9.5a1 1 0 0 0 1 1H7M13.5 2.5v9.5a1 1 0 0 1-1 1H9"/></svg>
            <span data-i18n="nav.docs">文档</span>
          </a>
        </div>
      </header>
      <!-- 全局创建会话弹窗：按钮已提到顶栏，弹窗随之全局化，任意页面均可拉起 -->
      <dialog id="create-session-modal" class="create-session-modal"></dialog>
      <!-- 全局 attention strip：待处理事项在任何页面都一眼可见 -->
      <div id="attention-strip" class="attention-strip" hidden></div>
      <main id="root"></main>
    </div>
  </div>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
